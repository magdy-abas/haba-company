<footer class="site-footer">
  <div class="site-footer__inner">
    <div class="site-footer__top">
      <a class="site-footer__logo" href="#" aria-label="HABAH">
        <img [src]="content.logo" alt="HABAH" />
      </a>

      <a class="site-footer__cta" href="#" aria-label="اطلب استشارة مجانية الآن">
        <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
        <span>{{ content.ctaLabel }}</span>
      </a>
    </div>

    <div class="site-footer__divider" aria-hidden="true"></div>

    <div class="site-footer__bottom">
      <div class="site-footer__social" aria-label="روابط التواصل الاجتماعي">
        <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      </div>

      <p class="site-footer__copyright">{{ content.copyright }}</p>
    </div>
  </div>
</footer>
