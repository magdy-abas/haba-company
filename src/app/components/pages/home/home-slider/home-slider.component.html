<section #sliderSection class="home-slider" [style.--slider-card-bg]="'url(' + assets.cardBackground + ')'"
  [style.--slider-card-icon]="'url(' + assets.cardIcon + ')'">
  <div class="home-slider__header">
    <div class="home-slider__glow" aria-hidden="true"></div>
    <h2 class="home-slider__title">{{ title }}</h2>
    <p class="home-slider__desc">{{ description }}</p>
  </div>

  <div class="home-slider__rows">
    <swiper-container class="home-slider__carousel" space-between="12" loop="true" free-mode="true"
      free-mode-momentum="true" speed="5000" autoplay="true" autoplay-disable-on-interaction="false"
      autoplay-reverse-direction="false" slides-per-view="1" breakpoints='{
        "576": { "slidesPerView": 2 },
        "992": { "slidesPerView": 3 }
      }'>
      <swiper-slide *ngFor="let service of topServicesSource">
        <article class="service-card">
          <div class="service-card__content">
            <div class="service-card__title-row">
              <div class="service-card__icon" aria-hidden="true"></div>
              <h3>{{ service.title }}</h3>
            </div>
            <p class="">{{ service.description }}</p>
          </div>
          <button class="service-card__btn" type="button">
            اعرف المزيد
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M7.85844 6.80937L3.66797 10.9998M3.66797 10.9998L7.85844 15.2207M3.66797 10.9998H17.287"
                stroke="#5E5E5E" stroke-linecap="round" stroke-linejoin="round" />
            </svg> </button>
        </article>
      </swiper-slide>
    </swiper-container>

    <swiper-container class="home-slider__carousel" space-between="12" loop="true" free-mode="true"
      free-mode-momentum="true" speed="5000" autoplay="true" autoplay-disable-on-interaction="false"
      autoplay-reverse-direction="true" slides-per-view="1" breakpoints='{
        "576": { "slidesPerView": 2 },
        "992": { "slidesPerView": 3 }
      }'>
      <swiper-slide *ngFor="let service of bottomServicesSource">
        <article class="service-card">
          <div class="service-card__content">
            <div class="service-card__title-row">
              <div class="service-card__icon" aria-hidden="true"></div>
              <h3>{{ service.title }}</h3>
            </div>
            <p>{{ service.description }}</p>
          </div>
          <button class="service-card__btn" type="button">
            اعرف المزيد
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M7.85844 6.80937L3.66797 10.9998M3.66797 10.9998L7.85844 15.2207M3.66797 10.9998H17.287"
                stroke="#5E5E5E" stroke-linecap="round" stroke-linejoin="round" />
            </svg> </button>
        </article>
      </swiper-slide>
    </swiper-container>
  </div>

  <a routerLink="/services" class="home-slider__cta">
    استكشف خدماتنا
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path

</section>
